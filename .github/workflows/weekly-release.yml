name: Weekly Release

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight UTC
  workflow_dispatch: # Allow manual runs

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install make
        run: sudo apt-get install -y --no-install-recommends make

      - name: Build
        run: make

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="release-$(date -u +%Y%m%d)"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Weekly automated release" \
            ./ggshield-ghes-pre-receive.tar.gz
